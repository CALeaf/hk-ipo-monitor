name: Backtest 2026

on:
  workflow_dispatch:
  schedule:
    # Once a week, Mon 10:00 HKT (02:00 UTC) — refresh the report as new IPOs list
    - cron: "0 2 * * 1"

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backtest
        run: python -m src.backtest

      - name: Commit report if changed
        run: |
          if [[ -n "$(git status --porcelain data/backtest_2026.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/backtest_2026.md
            git commit -m "backtest: refresh 2026 report [skip ci]"
            git push
          else
            echo "backtest_2026.md unchanged"
          fi

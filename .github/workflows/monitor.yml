name: Monitor HK IPOs

on:
  schedule:
    # 09:00 HKT = 01:00 UTC, 17:00 HKT = 09:00 UTC
    - cron: "0 1 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't push to Telegram)"
        type: boolean
        required: false
        default: false

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # to commit data/seen.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m src.monitor --dry-run
          else
            python -m src.monitor
          fi

      - name: Commit seen.json if changed
        run: |
          if [[ -n "$(git status --porcelain data/seen.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/seen.json
            git commit -m "monitor: update seen state [skip ci]"
            git push
          else
            echo "seen.json unchanged"
          fi
